<!DOCTYPE html>

      color: #ff0000;
    }

    .page {
      width: 100%;
      min-height: 100vh;
    }

    .header {
      position: relative;
      text-align: center;
      padding: 18px 20px 12px;
      min-height: 170px;
    }

    .title-block {
      max-width: 700px;
      margin: 0 auto;
    }

    .title-block h1 {
      margin: 0;
      font-size: 54px;
      line-height: 1;
      color: #000080;

    .title-block .small {
      margin: 2px 0 0;
      font-size: 18px;
      color: #000080;
      font-weight: bold;
    }

    .logo-box {
      position: absolute;
      top: 18px;
      right: 28px;
      background: #ffffff;
      border: 1px solid #bfbfbf;
      padding: 8px;
    }

    .logo-box img {
      display: block;
      width: 110px;
      height: auto;
    }

    .divider {
      border: none;
      border-top: 1px solid #666666;
      margin: 0;
    }

    .menu-wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 36px 20px 36px;
    }

    .menu {
      width: fit-content;
      margin: 0 auto;
      padding-left: 34px;
      text-align: left;
    }

    .menu li {
      margin: 24px 0;
      color: #000080;
      font-size: 20px;
    }

    .menu a {
      font-size: 28px;
    }

    .note {
      max-width: 1200px;
      margin: 0 auto;
      text-align: center;
      color: #000080;
      padding: 18px 20px;
      font-size: 20px;
    }

    .footer {
      max-width: 1200px;
      margin: 0 auto;
      padding: 18px 20px 28px;
      color: #000080;
    }

    .footer p {
      margin: 0 0 12px;
      font-size: 18px;
    }

    @media (max-width: 900px) {
      .header {
        min-height: auto;
        padding-top: 18px;
      }

      .logo-box {
        position: static;
        width: fit-content;
        margin: 18px auto 0;
      }
    }

    @media (max-width: 700px) {
      .title-block h1 {
        font-size: 38px;
      }

      .title-block .subtitle {
        font-size: 16px;
      }

      .title-block .small {
        font-size: 15px;
      }

      .menu a {
        font-size: 22px;
      }

      .logo-box img {
        width: 90px;
      }

      .note,
      .footer p {
        font-size: 16px;
      }
    }
